<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>成长OS · 个人OKR工作台</title>
<style>
:root{
  --bg:#0b0b09;--side:#11110f;--panel:#171714;--panel2:#1f1f1a;--panel3:#27271f;
  --line:#343326;--line2:#45422e;--txt:#f6f1dc;--muted:#9f9a83;--soft:#d8cf9b;
  --yellow:#ffd21e;--yellow2:#e5b900;--green:#5bd68e;--red:#ff766d;--blue:#7eb6ff;
  --shadow:0 18px 60px rgba(0,0,0,.34);--font:Inter,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif;
}
*{box-sizing:border-box}html{height:100%}body{min-height:100%;margin:0;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:14px;letter-spacing:0}
button,input,textarea,select{font:inherit}button{cursor:pointer}
.app{min-height:100vh;display:grid;grid-template-columns:232px 1fr;background:
  radial-gradient(circle at 80% 0%,rgba(255,210,30,.09),transparent 30%),var(--bg)}
.side{position:sticky;top:0;height:100vh;background:linear-gradient(180deg,#141410,#0d0d0b);border-right:1px solid var(--line);padding:22px 14px;display:flex;flex-direction:column;gap:18px}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 16px;border-bottom:1px solid var(--line)}
.mark{width:34px;height:34px;border-radius:8px;background:var(--yellow);color:#111;display:grid;place-items:center;font-weight:900}
.brand strong{display:block;font-size:18px}.brand span{display:block;color:var(--muted);font-size:12px;margin-top:2px}
.nav{display:grid;gap:6px}.nav button{height:42px;border:0;border-radius:8px;background:transparent;color:var(--muted);display:flex;align-items:center;gap:10px;padding:0 12px;text-align:left}
.nav button svg{width:18px;height:18px}.nav button.active{background:var(--yellow);color:#111;font-weight:800}.nav button:hover:not(.active){background:var(--panel2);color:var(--txt)}
.sideFoot{margin-top:auto;border:1px solid var(--line);background:#151510;border-radius:8px;padding:12px}.sideFoot b{display:block;color:var(--yellow);margin-bottom:6px}.sideFoot p{margin:0;color:var(--muted);font-size:12px;line-height:1.55}
.main{min-width:0;padding:22px 24px 30px}.top{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:20px}
.title h1{margin:0;font-size:25px;line-height:1.18}.title p{margin:7px 0 0;color:var(--muted)}
.actions{display:flex;gap:10px;align-items:center}.select,.btn,.ghost,.iconBtn{border:1px solid var(--line2);border-radius:8px;background:var(--panel2);color:var(--txt);height:38px;padding:0 12px}
.btn{background:var(--yellow);border-color:var(--yellow);color:#111;font-weight:800}.ghost:hover,.select:hover,.iconBtn:hover{border-color:var(--yellow);color:var(--yellow)}
.iconBtn{width:38px;padding:0;display:grid;place-items:center}.iconBtn svg{width:17px;height:17px}
.grid{display:grid;gap:14px;min-width:0}.dashboard{grid-template-columns:minmax(0,1.35fr) 360px}.stats{grid-template-columns:repeat(4,minmax(0,1fr))}
.panel{min-width:0;background:rgba(23,23,20,.94);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}
.panel.pad{padding:16px}.panelHead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.panelHead h2{font-size:16px;margin:0}.panelHead small{color:var(--muted)}
.stat{padding:15px;border-radius:8px;border:1px solid var(--line);background:linear-gradient(180deg,var(--panel2),#171713)}
.stat label{display:block;color:var(--muted);font-size:12px;margin-bottom:9px}.stat strong{font-size:28px;line-height:1}.stat span{display:block;color:var(--soft);font-size:12px;margin-top:8px}
.bar{height:8px;background:#2c2b22;border-radius:999px;overflow:hidden}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--yellow),#fff08a);border-radius:inherit}
.okrList,.taskList,.reviewList{display:grid;gap:10px}.objective{border:1px solid var(--line);border-radius:8px;background:#151510;padding:13px}.objectiveTop{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
.objective h3{margin:0 0 5px;font-size:15px}.meta{color:var(--muted);font-size:12px}.kr{margin-top:10px;padding:10px;border-radius:8px;background:var(--panel2);border:1px solid var(--line)}
.krTop{display:flex;justify-content:space-between;gap:12px;align-items:center}.krTitle{font-weight:750}.pill{display:inline-flex;align-items:center;justify-content:center;min-height:24px;padding:2px 8px;border-radius:999px;background:#2c2a1c;color:var(--yellow);font-size:12px;font-weight:800;border:1px solid #51491e}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px;border:1px solid var(--line);border-radius:8px;background:#151510}.rowMain{min-width:0}.rowMain b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rowMain span{display:block;color:var(--muted);font-size:12px;margin-top:4px}
.status{min-width:66px;text-align:center;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:800;border:1px solid var(--line2);color:var(--muted)}.status.done{color:#112116;background:var(--green);border-color:var(--green)}.status.doing{color:#111;background:var(--yellow);border-color:var(--yellow)}.status.at_risk{color:#2a0907;background:var(--red);border-color:var(--red)}
.tabs{display:flex;gap:6px;background:#11110e;border:1px solid var(--line);padding:4px;border-radius:8px}.tabs button{height:30px;border:0;background:transparent;color:var(--muted);border-radius:6px;padding:0 10px}.tabs button.active{background:var(--yellow);color:#111;font-weight:800}
.form{display:grid;gap:10px}.field{display:grid;gap:6px}.field label{font-size:12px;color:var(--muted)}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line2);background:#10100d;color:var(--txt);border-radius:8px;padding:10px 11px;outline:none}.field textarea{resize:vertical;min-height:84px}.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--yellow)}
.formGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.empty{padding:28px 14px;text-align:center;color:var(--muted);border:1px dashed var(--line2);border-radius:8px;background:#12120f}
.page{display:none}.page.active{display:block}.cols{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:14px}.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.archiveItem{border-left:3px solid var(--yellow);padding:12px;background:#151510;border-radius:0 8px 8px 0;border-top:1px solid var(--line);border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
.insight{line-height:1.65;color:var(--soft);background:#14140f;border:1px solid #39351f;border-radius:8px;padding:12px}.danger{color:var(--red)}.ok{color:var(--green)}
@media(max-width:1050px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.nav{grid-template-columns:repeat(5,minmax(0,1fr))}.nav button{justify-content:center;padding:0}.nav button span{display:none}.dashboard,.cols,.two{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.main{padding:18px}}
@media(max-width:1320px) and (min-width:1051px){.dashboard{grid-template-columns:1fr}.stats{grid-template-columns:repeat(4,minmax(0,1fr))}}
@media(max-width:620px){.top{display:grid}.actions{flex-wrap:wrap}.stats,.formGrid{grid-template-columns:1fr}.side{padding:14px}.main{padding:14px}.brand{padding-bottom:12px}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="mark">OS</div><div><strong>成长OS</strong><span>季度目标 · 周计划 · AI复盘</span></div></div>
    <nav class="nav" id="nav"></nav>
    <div class="sideFoot"><b id="sideQuarter">2026 Q3</b><p>目标、行动和复盘会自动沉淀在本地浏览器。无需飞书，无需后端。</p></div>
  </aside>
  <main class="main">
    <header class="top">
      <div class="title"><h1 id="pageTitle">首页</h1><p id="pageSub">用一个工作台看清本季度的成长进度。</p></div>
      <div class="actions">
        <select class="select" id="quarterSelect"></select>
        <button class="ghost" id="seedBtn">重置示例</button>
        <button class="btn" id="quickTaskBtn">新建任务</button>
      </div>
    </header>

    <section class="page active" data-page="home">
      <div class="grid dashboard">
        <div class="grid">
          <div class="grid stats" id="stats"></div>
          <div class="panel pad">
            <div class="panelHead"><h2>KR进度</h2><small>当前季度</small></div>
            <div class="okrList" id="homeKrs"></div>
          </div>
          <div class="panel pad">
            <div class="panelHead"><h2>本周任务</h2><button class="ghost" data-go="plans">查看计划中心</button></div>
            <div class="taskList" id="weekTasks"></div>
          </div>
        </div>
        <div class="grid">
          <div class="panel pad">
            <div class="panelHead"><h2>AI成长洞察</h2><span class="pill">本地生成</span></div>
            <div class="insight" id="homeInsight"></div>
          </div>
          <div class="panel pad">
            <div class="panelHead"><h2>今日复盘</h2><small id="todayLabel"></small></div>
            <div id="dailyMini"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="page" data-page="okr">
      <div class="cols">
        <div class="panel pad">
          <div class="panelHead"><h2>季度目标</h2><small id="okrSummary"></small></div>
          <div class="okrList" id="okrList"></div>
        </div>
        <div class="grid">
          <div class="panel pad"><div class="panelHead"><h2>创建季度O目标</h2></div><form class="form" id="objectiveForm"><div class="field"><label>Objective</label><input name="title" required placeholder="例如：建立稳定的产品增长能力"></div><div class="field"><label>描述</label><textarea name="description" placeholder="这季度最重要的成长方向"></textarea></div><button class="btn">创建目标</button></form></div>
          <div class="panel pad"><div class="panelHead"><h2>创建KR</h2></div><form class="form" id="krForm"><div class="field"><label>所属Objective</label><select name="objectiveId" required></select></div><div class="field"><label>Key Result</label><input name="title" required placeholder="例如：完成3个可复用增长实验"></div><div class="formGrid"><div class="field"><label>目标值</label><input name="target" placeholder="3个实验"></div><div class="field"><label>当前进度</label><input name="progress" type="number" min="0" max="100" value="0"></div></div><button class="btn">创建KR</button></form></div>
        </div>
      </div>
    </section>

    <section class="page" data-page="plans">
      <div class="cols">
        <div class="panel pad"><div class="panelHead"><h2>计划中心</h2><small id="planSummary"></small></div><div class="taskList" id="taskList"></div></div>
        <div class="panel pad"><div class="panelHead"><h2>新建任务</h2></div><form class="form" id="taskForm"><div class="field"><label>任务</label><input name="title" required placeholder="写下本周要推进的具体动作"></div><div class="field"><label>关联KR</label><select name="keyResultId"></select></div><div class="formGrid"><div class="field"><label>日期</label><input name="date" type="date"></div><div class="field"><label>优先级</label><select name="priority"><option value="high">高</option><option value="medium" selected>中</option><option value="low">低</option></select></div></div><div class="field"><label>描述</label><textarea name="description" placeholder="补充背景、产出标准或链接"></textarea></div><button class="btn">加入计划</button></form></div>
      </div>
    </section>

    <section class="page" data-page="reviews">
      <div class="panel pad">
        <div class="panelHead"><h2>AI复盘</h2><div class="tabs" id="reviewTabs"><button data-review="daily" class="active">每日复盘</button><button data-review="weekly">周复盘</button><button data-review="quarter">季度复盘</button></div></div>
        <div id="reviewView"></div>
      </div>
    </section>

    <section class="page" data-page="archive">
      <div class="two">
        <div class="panel pad"><div class="panelHead"><h2>成长档案</h2><small>历史季度</small></div><div class="reviewList" id="archiveList"></div></div>
        <div class="panel pad"><div class="panelHead"><h2>长期模式</h2><span class="pill">自动沉淀</span></div><div class="insight" id="archiveInsight"></div></div>
      </div>
    </section>
  </main>
</div>

<script>
var STORE_KEY='growth-os-data-v1';
var pages=[
  ['home','首页','用一个工作台看清本季度的成长进度。','home'],
  ['okr','季度目标','管理季度O目标、KR进度、关联任务和产出记录。','target'],
  ['plans','计划中心','把KR拆成本周任务，并跟踪完成率。','calendar'],
  ['reviews','AI复盘','每日轻量记录，自动汇总周复盘和季度复盘。','spark'],
  ['archive','成长档案','沉淀历史季度、关键产出和成长模式。','archive']
];
var state={page:'home',review:'daily'};
function uid(p){return p+'_'+Math.random().toString(36).slice(2,9)+'_'+Date.now().toString(36)}
function iso(d){return new Date(d).toISOString().slice(0,10)}
function today(){return iso(new Date())}
function weekStart(date){var d=new Date(date);var day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return iso(d)}
function weekEnd(date){var d=new Date(weekStart(date));d.setDate(d.getDate()+6);return iso(d)}
function currentQuarter(){var d=new Date(),m=d.getMonth(),q=Math.floor(m/3)+1,y=d.getFullYear();return {year:y,quarter:q,name:y+' Q'+q,startDate:iso(new Date(y,(q-1)*3,1)),endDate:iso(new Date(y,q*3,0))}}
function clamp(n){return Math.max(0,Math.min(100,Number(n)||0))}
function fmtPct(n){return Math.round(n)+'%'}
function icon(name){var map={
home:'<path d="M3 10.5 12 3l9 7.5"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/>',
target:'<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>',
calendar:'<path d="M4 5h16v15H4z"/><path d="M8 3v4M16 3v4M4 10h16"/>',
spark:'<path d="m12 3 1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8z"/><path d="m5 17 .7 2.1L8 20l-2.3.9L5 23l-.7-2.1L2 20l2.3-.9z"/>',
archive:'<path d="M4 4h16v5H4z"/><path d="M6 9v11h12V9"/><path d="M9 13h6"/>',
plus:'<path d="M12 5v14M5 12h14"/>',check:'<path d="m5 12 4 4L19 6"/>'
};return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+map[name]+'</svg>'}
function seedData(){
 var q=currentQuarter(),qid='q_'+q.year+'_'+q.quarter,o1=uid('obj'),o2=uid('obj'),kr1=uid('kr'),kr2=uid('kr'),kr3=uid('kr');
 return {quarters:[{id:qid,name:q.name,year:q.year,quarter:q.quarter,startDate:q.startDate,endDate:q.endDate,status:'active',createdAt:today(),updatedAt:today()}],
 objectives:[{id:o1,quarterId:qid,title:'建立个人成长管理系统',description:'让目标、计划、复盘形成稳定闭环。',status:'active',createdAt:today(),updatedAt:today()},{id:o2,quarterId:qid,title:'提升可持续输出能力',description:'把学习、产出和反馈变成每周节奏。',status:'active',createdAt:today(),updatedAt:today()}],
 keyResults:[{id:kr1,objectiveId:o1,title:'完成成长OS第一版并持续使用4周',target:'4周',current:'第1周',progress:35,status:'active',outputs:[{id:uid('out'),title:'产品架构设计',description:'完成季度目标、计划、复盘模块设计',date:today()}],createdAt:today(),updatedAt:today()},{id:kr2,objectiveId:o1,title:'连续完成20次每日复盘',target:'20次',current:'3次',progress:15,status:'at_risk',outputs:[],createdAt:today(),updatedAt:today()},{id:kr3,objectiveId:o2,title:'沉淀6个可复用作品或方法论',target:'6个',current:'2个',progress:33,status:'active',outputs:[],createdAt:today(),updatedAt:today()}],
 tasks:[{id:uid('task'),title:'梳理本季度3个核心Objective',keyResultId:kr1,quarterId:qid,date:today(),weekId:weekStart(today()),status:'done',priority:'high',createdAt:today(),updatedAt:today(),completedAt:today()},{id:uid('task'),title:'完成成长OS首页仪表盘',keyResultId:kr1,quarterId:qid,date:today(),weekId:weekStart(today()),status:'doing',priority:'high',createdAt:today(),updatedAt:today()},{id:uid('task'),title:'记录今天的收获与阻碍',keyResultId:kr2,quarterId:qid,date:today(),weekId:weekStart(today()),status:'todo',priority:'medium',createdAt:today(),updatedAt:today()}],
 dailyReviews:[{id:uid('dr'),date:today(),completed:'完成产品架构和核心页面拆解。',learnings:'目标管理需要足够轻，才容易坚持。',blockers:'任务容易分散，优先级需要更明确。',tomorrowFocus:'先推进OKR和任务联动。',createdAt:today(),updatedAt:today()}],
 weeklyReviews:[],quarterReviews:[],settings:{currentQuarterId:qid}};
}
function load(){try{var data=JSON.parse(localStorage.getItem(STORE_KEY)||'null');if(data&&data.quarters)return data}catch(e){}var data=seedData();save(data);return data}
function save(data){localStorage.setItem(STORE_KEY,JSON.stringify(data))}
var data=load();
function currentQ(){return data.quarters.find(function(q){return q.id===data.settings.currentQuarterId})||data.quarters[0]}
function qObjectives(){var q=currentQ();return data.objectives.filter(function(o){return o.quarterId===q.id})}
function objectiveKrs(id){return data.keyResults.filter(function(k){return k.objectiveId===id})}
function qKrs(){var ids=qObjectives().map(function(o){return o.id});return data.keyResults.filter(function(k){return ids.indexOf(k.objectiveId)>=0})}
function qTasks(){var ids=qKrs().map(function(k){return k.id});return data.tasks.filter(function(t){return t.quarterId===currentQ().id||ids.indexOf(t.keyResultId)>=0})}
function completion(){var k=qKrs();return k.length?k.reduce(function(s,x){return s+clamp(x.progress)},0)/k.length:0}
function weekTasks(){var ws=weekStart(today());return qTasks().filter(function(t){return t.weekId===ws||t.date>=ws&&t.date<=weekEnd(today())})}
function doneRate(tasks){return tasks.length?tasks.filter(function(t){return t.status==='done'}).length/tasks.length*100:0}
function streak(){var dates=data.dailyReviews.map(function(r){return r.date}).sort().reverse();var count=0,d=new Date(today());for(;;){var s=iso(d);if(dates.indexOf(s)>=0){count++;d.setDate(d.getDate()-1)}else break}return count}
function krName(id){var k=data.keyResults.find(function(x){return x.id===id});return k?k.title:'未关联KR'}
function renderNav(){var el=document.getElementById('nav');el.innerHTML=pages.map(function(p){return '<button class="'+(state.page===p[0]?'active':'')+'" data-pagebtn="'+p[0]+'">'+icon(p[3])+'<span>'+p[1]+'</span></button>'}).join('')}
function renderShell(){renderNav();var p=pages.find(function(x){return x[0]===state.page});document.getElementById('pageTitle').textContent=p[1];document.getElementById('pageSub').textContent=p[2];document.querySelectorAll('.page').forEach(function(s){s.classList.toggle('active',s.dataset.page===state.page)});var qs=document.getElementById('quarterSelect');qs.innerHTML=data.quarters.map(function(q){return '<option value="'+q.id+'">'+q.name+'</option>'}).join('');qs.value=currentQ().id;document.getElementById('sideQuarter').textContent=currentQ().name}
function renderStats(){var wt=weekTasks();var items=[['当前季度完成率',fmtPct(completion()),qKrs().length+' 个KR正在推进'],['KR进度',qKrs().filter(function(k){return k.progress>=80}).length+'/'+qKrs().length,'接近完成的关键结果'],['本周任务完成率',fmtPct(doneRate(wt)),wt.filter(function(t){return t.status==='done'}).length+' / '+wt.length+' 个任务完成'],['连续复盘',streak()+'天','保持每日轻量记录']];document.getElementById('stats').innerHTML=items.map(function(i){var n=parseInt(i[1])||0;return '<div class="stat"><label>'+i[0]+'</label><strong>'+i[1]+'</strong><span>'+i[2]+'</span><div class="bar" style="margin-top:12px"><i style="width:'+Math.min(100,n)+'%"></i></div></div>'}).join('')}
function renderKrRows(target,limit){var k=qKrs().slice(0,limit||999);document.getElementById(target).innerHTML=k.length?k.map(function(x){var tasks=data.tasks.filter(function(t){return t.keyResultId===x.id});return '<div class="row"><div class="rowMain"><b>'+x.title+'</b><span>'+tasks.length+' 个关联任务 · '+x.outputs.length+' 条产出</span><div class="bar" style="margin-top:9px"><i style="width:'+clamp(x.progress)+'%"></i></div></div><span class="pill">'+clamp(x.progress)+'%</span></div>'}).join(''):'<div class="empty">还没有KR，去季度目标创建第一个关键结果。</div>'}
function renderTasks(target,tasks){document.getElementById(target).innerHTML=tasks.length?tasks.map(function(t){return '<div class="row"><div class="rowMain"><b>'+t.title+'</b><span>'+krName(t.keyResultId)+' · '+(t.date||'未排期')+' · '+t.priority+'</span></div><button class="status '+t.status+'" data-task="'+t.id+'">'+(t.status==='done'?'完成':t.status==='doing'?'进行中':'待做')+'</button></div>'}).join(''):'<div class="empty">暂无任务。把KR拆成今天能推进的一步。</div>'}
function insight(){var wt=weekTasks(),rate=doneRate(wt),blockers=data.dailyReviews.slice(-7).map(function(r){return r.blockers}).filter(Boolean).join('；');var top=qKrs().slice().sort(function(a,b){return b.progress-a.progress})[0];var low=qKrs().slice().sort(function(a,b){return a.progress-b.progress})[0];var s='本季度完成率为 '+fmtPct(completion())+'，本周任务完成率为 '+fmtPct(rate)+'。';if(top)s+=' 当前推进最好的KR是「'+top.title+'」。';if(low&&low.progress<30)s+=' 需要关注「'+low.title+'」，它的进度仍低于30%。';if(blockers)s+=' 最近阻碍集中在：'+blockers.slice(0,70)+'。';return s+' 建议下周只保留少量高优先级任务，并把每个任务明确关联到KR。'}
function dailyForm(compact){var r=data.dailyReviews.find(function(x){return x.date===today()})||{};return '<form class="form" id="'+(compact?'dailyMiniForm':'dailyForm')+'"><div class="field"><label>今日完成</label><textarea name="completed">'+(r.completed||'')+'</textarea></div><div class="field"><label>今日收获</label><textarea name="learnings">'+(r.learnings||'')+'</textarea></div><div class="field"><label>今日阻碍</label><textarea name="blockers">'+(r.blockers||'')+'</textarea></div><div class="field"><label>明日重点</label><textarea name="tomorrowFocus">'+(r.tomorrowFocus||'')+'</textarea></div><button class="btn">保存复盘</button></form>'}
function renderHome(){renderStats();renderKrRows('homeKrs',5);renderTasks('weekTasks',weekTasks());document.getElementById('homeInsight').textContent=insight();document.getElementById('todayLabel').textContent=today();document.getElementById('dailyMini').innerHTML=dailyForm(true)}
function renderOkr(){document.getElementById('okrSummary').textContent=fmtPct(completion())+' 完成 · '+qObjectives().length+' 个目标';document.getElementById('okrList').innerHTML=qObjectives().length?qObjectives().map(function(o){var krs=objectiveKrs(o.id),avg=krs.length?krs.reduce(function(s,k){return s+clamp(k.progress)},0)/krs.length:0;return '<div class="objective"><div class="objectiveTop"><div><h3>'+o.title+'</h3><div class="meta">'+(o.description||'暂无描述')+'</div></div><span class="pill">'+fmtPct(avg)+'</span></div>'+krs.map(function(k){return '<div class="kr"><div class="krTop"><div class="krTitle">'+k.title+'</div><input data-kr-progress="'+k.id+'" type="range" min="0" max="100" value="'+clamp(k.progress)+'"></div><div class="meta">目标：'+(k.target||'未设置')+' · 产出 '+k.outputs.length+' 条</div><div class="bar" style="margin-top:9px"><i style="width:'+clamp(k.progress)+'%"></i></div><form class="form" data-output-form="'+k.id+'" style="margin-top:10px"><div class="formGrid"><input name="title" placeholder="记录KR产出"><input name="link" placeholder="链接，可选"></div></form></div>'}).join('')+'</div>'}).join(''):'<div class="empty">还没有季度目标。</div>';var os=document.querySelector('#krForm select[name=objectiveId]');os.innerHTML=qObjectives().map(function(o){return '<option value="'+o.id+'">'+o.title+'</option>'}).join('')}
function renderPlans(){var tasks=qTasks();document.getElementById('planSummary').textContent='本周 '+fmtPct(doneRate(weekTasks()))+' · 当前季度 '+tasks.length+' 个任务';var grouped=['doing','todo','done'].flatMap(function(s){return tasks.filter(function(t){return t.status===s})});renderTasks('taskList',grouped);var sel=document.querySelector('#taskForm select[name=keyResultId]');sel.innerHTML='<option value="">不关联KR</option>'+qKrs().map(function(k){return '<option value="'+k.id+'">'+k.title+'</option>'}).join('');document.querySelector('#taskForm input[name=date]').value=today()}
function weeklyReview(){var wt=weekTasks(),dr=data.dailyReviews.filter(function(r){return r.date>=weekStart(today())&&r.date<=weekEnd(today())});return '<div class="insight"><b>自动周复盘</b><br>本周完成 '+wt.filter(function(t){return t.status==='done'}).length+' / '+wt.length+' 个任务。每日复盘 '+dr.length+' 次。<br>主要完成：'+(wt.filter(function(t){return t.status==='done'}).map(function(t){return t.title}).join('、')||'暂无')+'。<br>阻碍线索：'+(dr.map(function(r){return r.blockers}).filter(Boolean).join('；')||'暂无明显阻碍')+'。<br>下周建议：围绕低进度KR安排1-3个高优先级任务。</div>'}
function quarterReview(){var outs=qKrs().flatMap(function(k){return k.outputs.map(function(o){return o.title})});return '<div class="insight"><b>季度AI总结</b><br>'+currentQ().name+' 当前OKR完成率 '+fmtPct(completion())+'。共有 '+qObjectives().length+' 个Objective、'+qKrs().length+' 个KR、'+qTasks().length+' 个任务。<br>关键产出：'+(outs.join('、')||'暂未记录产出')+'。<br>成长洞察：'+insight()+'</div>'}
function renderReviews(){document.querySelectorAll('#reviewTabs button').forEach(function(b){b.classList.toggle('active',b.dataset.review===state.review)});var v=document.getElementById('reviewView');if(state.review==='daily')v.innerHTML=dailyForm(false);if(state.review==='weekly')v.innerHTML=weeklyReview();if(state.review==='quarter')v.innerHTML=quarterReview()}
function renderArchive(){document.getElementById('archiveList').innerHTML=data.quarters.map(function(q){var old=data.settings.currentQuarterId;data.settings.currentQuarterId=q.id;var c=completion();data.settings.currentQuarterId=old;return '<div class="archiveItem"><b>'+q.name+'</b><div class="meta">完成率 '+fmtPct(c)+' · '+q.status+'</div></div>'}).join('');document.getElementById('archiveInsight').textContent='已累计 '+data.dailyReviews.length+' 条每日复盘、'+data.tasks.filter(function(t){return t.status==='done'}).length+' 个完成任务、'+qKrs().reduce(function(s,k){return s+k.outputs.length},0)+' 条KR产出。高频阻碍会从每日复盘中持续浮现，帮助你调整计划密度。'}
function render(){renderShell();renderHome();renderOkr();renderPlans();renderReviews();renderArchive();bindDynamic()}
function upsertDaily(form){var old=data.dailyReviews.find(function(r){return r.date===today()}),payload={date:today(),completed:form.completed.value,learnings:form.learnings.value,blockers:form.blockers.value,tomorrowFocus:form.tomorrowFocus.value,updatedAt:today()};if(old)Object.assign(old,payload);else data.dailyReviews.push(Object.assign({id:uid('dr'),createdAt:today()},payload));save(data);render()}
function bindDynamic(){document.querySelectorAll('[data-task]').forEach(function(b){b.onclick=function(){var t=data.tasks.find(function(x){return x.id===b.dataset.task});t.status=t.status==='todo'?'doing':t.status==='doing'?'done':'todo';t.completedAt=t.status==='done'?today():'';t.updatedAt=today();save(data);render()}});document.querySelectorAll('[data-kr-progress]').forEach(function(i){i.oninput=function(){var k=data.keyResults.find(function(x){return x.id===i.dataset.krProgress});k.progress=clamp(i.value);k.status=k.progress>=100?'completed':k.progress<30?'at_risk':'active';k.updatedAt=today();save(data);render()}});document.querySelectorAll('[data-output-form]').forEach(function(f){f.onsubmit=function(e){e.preventDefault();var k=data.keyResults.find(function(x){return x.id===f.dataset.outputForm});if(!f.title.value.trim())return;k.outputs.push({id:uid('out'),title:f.title.value.trim(),link:f.link.value.trim(),date:today()});f.reset();save(data);render()}});['dailyForm','dailyMiniForm'].forEach(function(id){var f=document.getElementById(id);if(f)f.onsubmit=function(e){e.preventDefault();upsertDaily(f)}})}
document.addEventListener('click',function(e){var p=e.target.closest('[data-pagebtn],[data-go]');if(p){state.page=p.dataset.pagebtn||p.dataset.go;render()}var r=e.target.closest('[data-review]');if(r){state.review=r.dataset.review;render()}})
document.getElementById('quarterSelect').onchange=function(){data.settings.currentQuarterId=this.value;save(data);render()}
document.getElementById('seedBtn').onclick=function(){if(confirm('重置为示例数据？当前本地数据会被覆盖。')){data=seedData();save(data);render()}}
document.getElementById('quickTaskBtn').onclick=function(){state.page='plans';render();setTimeout(function(){document.querySelector('#taskForm input[name=title]').focus()},0)}
document.getElementById('objectiveForm').onsubmit=function(e){e.preventDefault();var f=e.target;data.objectives.push({id:uid('obj'),quarterId:currentQ().id,title:f.title.value.trim(),description:f.description.value.trim(),status:'active',createdAt:today(),updatedAt:today()});f.reset();save(data);render()}
document.getElementById('krForm').onsubmit=function(e){e.preventDefault();var f=e.target;data.keyResults.push({id:uid('kr'),objectiveId:f.objectiveId.value,title:f.title.value.trim(),target:f.target.value.trim(),current:'',progress:clamp(f.progress.value),status:'active',outputs:[],createdAt:today(),updatedAt:today()});f.reset();save(data);render()}
document.getElementById('taskForm').onsubmit=function(e){e.preventDefault();var f=e.target;var kr=data.keyResults.find(function(k){return k.id===f.keyResultId.value});data.tasks.push({id:uid('task'),title:f.title.value.trim(),description:f.description.value.trim(),keyResultId:f.keyResultId.value,quarterId:currentQ().id,date:f.date.value||today(),weekId:weekStart(f.date.value||today()),status:'todo',priority:f.priority.value,createdAt:today(),updatedAt:today()});f.reset();save(data);render()}
render();
</script>
</body>
</html>
